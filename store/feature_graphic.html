<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EarnYourScreen – Feature Graphic</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1024px;
    height: 500px;
    overflow: hidden;
    background: #7F77DD;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  .graphic {
    width: 1024px;
    height: 500px;
    background: #7F77DD;
    position: relative;
    display: flex;
    align-items: center;
    overflow: hidden;
  }

  /* Background decorative circles */
  .bg-circle {
    position: absolute;
    border-radius: 50%;
    background: rgba(255,255,255,0.04);
  }

  /* LEFT SIDE — Text */
  .text-side {
    padding: 60px 0 60px 72px;
    flex: 1;
    z-index: 2;
    position: relative;
  }
  .app-name {
    font-size: 64px;
    font-weight: 900;
    color: #fff;
    letter-spacing: -2px;
    line-height: 1;
    margin-bottom: 20px;
  }
  .app-name span { color: #EF9F27; }
  .tagline {
    font-size: 28px;
    color: #AFA9EC;
    font-weight: 500;
    letter-spacing: 0.5px;
    margin-bottom: 40px;
    line-height: 1.4;
  }
  .pill-row {
    display: flex;
    gap: 16px;
    align-items: center;
  }
  .pill {
    border-radius: 40px;
    padding: 10px 28px;
    font-size: 22px;
    font-weight: 700;
  }
  .pill-edu { background: rgba(255,255,255,0.15); color: #fff; }
  .pill-free { background: #EF9F27; color: #fff; }
  .pill-rated { background: rgba(29,158,117,0.3); color: #7ff5c8; border: 1px solid rgba(29,158,117,0.5); }

  /* RIGHT SIDE — Phone illustration */
  .phone-side {
    width: 340px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding-right: 48px;
    position: relative;
    z-index: 2;
    flex-shrink: 0;
  }
  .phone-shell {
    width: 220px;
    height: 380px;
    background: #1a1a2e;
    border-radius: 36px;
    border: 6px solid #2e2e4e;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    box-shadow: 0 24px 64px rgba(0,0,0,0.5), 0 0 0 2px rgba(255,255,255,0.06);
    position: relative;
  }
  .phone-notch {
    width: 80px;
    height: 16px;
    background: #1a1a2e;
    border-radius: 0 0 12px 12px;
    margin: 0 auto;
    position: relative;
    z-index: 10;
  }
  .phone-screen {
    flex: 1;
    background: #F1EFE8;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 16px;
    gap: 12px;
    position: relative;
    overflow: hidden;
  }

  /* Lock → Star transformation */
  .transform-container {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-bottom: 4px;
  }
  .lock-shape {
    width: 64px;
    height: 72px;
    position: relative;
    flex-shrink: 0;
  }
  .lock-body {
    width: 64px;
    height: 44px;
    background: #D85A30;
    border-radius: 10px;
    position: absolute;
    bottom: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .lock-shackle {
    width: 36px;
    height: 32px;
    border: 8px solid #D85A30;
    border-bottom: none;
    border-radius: 18px 18px 0 0;
    position: absolute;
    top: 0;
    left: 14px;
  }
  .lock-keyhole {
    width: 12px;
    height: 18px;
    background: rgba(255,255,255,0.6);
    border-radius: 6px 6px 2px 2px;
  }
  .arrow-svg {
    flex-shrink: 0;
  }
  .star-shape {
    flex-shrink: 0;
  }

  /* Star using CSS clip-path */
  .star-css {
    width: 72px;
    height: 72px;
    background: #1D9E75;
    clip-path: polygon(
      50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%,
      50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%
    );
    box-shadow: 0 4px 20px rgba(29,158,117,0.5);
    position: relative;
    flex-shrink: 0;
  }

  .xp-pill-screen {
    background: #EF9F27;
    color: #fff;
    border-radius: 20px;
    padding: 8px 20px;
    font-size: 20px;
    font-weight: 800;
  }
  .unlock-label {
    font-size: 16px;
    color: #7F77DD;
    font-weight: 700;
    text-align: center;
    line-height: 1.3;
  }

  /* Floating elements around phone */
  .float-badge {
    position: absolute;
    background: #fff;
    border-radius: 20px;
    padding: 10px 18px;
    font-size: 18px;
    font-weight: 700;
    color: #1a1a2e;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    white-space: nowrap;
  }

  /* Bottom pill */
  .bottom-pill {
    position: absolute;
    bottom: 28px;
    left: 72px;
    background: rgba(175,169,236,0.2);
    border: 1.5px solid rgba(175,169,236,0.4);
    color: #AFA9EC;
    border-radius: 40px;
    padding: 8px 24px;
    font-size: 20px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }

  /* Decorative dots grid */
  .dots-grid {
    position: absolute;
    right: 360px;
    top: 50%;
    transform: translateY(-50%);
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 14px;
    opacity: 0.12;
  }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: #fff; }
</style>
</head>
<body>
<div class="graphic">
  <!-- Background decorative circles -->
  <div class="bg-circle" style="width:600px;height:600px;top:-200px;right:-100px;"></div>
  <div class="bg-circle" style="width:300px;height:300px;bottom:-150px;left:300px;"></div>
  <div class="bg-circle" style="width:160px;height:160px;top:40px;left:520px;"></div>

  <!-- Dots grid decoration -->
  <div class="dots-grid">
    <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
    <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
    <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
    <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
    <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
  </div>

  <!-- Left: Text content -->
  <div class="text-side">
    <div class="app-name">earn<span>your</span><br>screen</div>
    <div class="tagline">Unlock time. Earn it first.</div>
    <div class="pill-row">
      <div class="pill pill-edu">Education</div>
      <div class="pill pill-free">Free</div>
      <div class="pill pill-rated">Everyone ✓</div>
    </div>
  </div>

  <!-- Right: Phone illustration -->
  <div class="phone-side">
    <!-- Floating badges around phone -->
    <div class="float-badge" style="top: 44px; left: -20px; color: #EF9F27;">⚡ +30 XP</div>
    <div class="float-badge" style="bottom: 60px; left: -36px; color: #D85A30; font-size: 16px;">🔒 → ⭐</div>
    <div class="float-badge" style="top: 100px; right: -10px; font-size: 15px; color: #1D9E75;">🔥 5 day streak</div>

    <div class="phone-shell">
      <div class="phone-notch"></div>
      <div class="phone-screen">
        <div class="transform-container">
          <!-- Lock shape -->
          <div class="lock-shape">
            <div class="lock-shackle"></div>
            <div class="lock-body">
              <div class="lock-keyhole"></div>
            </div>
          </div>

          <!-- Arrow -->
          <svg class="arrow-svg" width="28" height="28" viewBox="0 0 24 24" fill="none">
            <path d="M5 12h14M13 6l6 6-6 6" stroke="#7F77DD" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>

          <!-- Star -->
          <div class="star-css"></div>
        </div>

        <div class="xp-pill-screen">+30 XP earned!</div>
        <div class="unlock-label">Answer questions<br>to unlock apps</div>
      </div>
    </div>
  </div>

  <!-- Bottom pill -->
  <div class="bottom-pill">Education · Free · No Ads</div>
</div>
</body>
</html>
