<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EarnYourScreen – Lock Interstitial</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1920px;
    background: #1a1a2e;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    overflow: hidden;
  }
  .phone-frame {
    width: 1000px;
    height: 1840px;
    background: #F1EFE8;
    border-radius: 80px;
    border: 8px solid #2a2a3e;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    box-shadow: 0 0 80px rgba(0,0,0,0.6);
  }
  .caption-banner {
    width: 100%;
    background: #D85A30;
    padding: 32px 48px;
    text-align: center;
    color: #fff;
    font-size: 42px;
    font-weight: 700;
    letter-spacing: 0.5px;
    flex-shrink: 0;
  }
  .status-bar {
    background: #F1EFE8;
    padding: 20px 48px 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
  }
  .status-time { color: #333; font-size: 30px; font-weight: 600; }
  .status-icons { color: #333; font-size: 26px; letter-spacing: 6px; }
  .main-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 64px;
    gap: 0;
  }
  .blurred-bg {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, rgba(127,119,221,0.08) 0%, transparent 70%);
    pointer-events: none;
  }
  .app-icon-wrapper {
    position: relative;
    margin-bottom: 48px;
  }
  .app-icon-large {
    width: 180px;
    height: 180px;
    border-radius: 44px;
    background: linear-gradient(135deg, #833ab4, #fd1d1d, #fcb045);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 90px;
    box-shadow: 0 16px 48px rgba(131,58,180,0.35);
  }
  .lock-overlay {
    position: absolute;
    bottom: -20px;
    right: -20px;
    width: 80px;
    height: 80px;
    background: #D85A30;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 40px;
    border: 6px solid #F1EFE8;
    box-shadow: 0 4px 16px rgba(216,90,48,0.4);
  }
  .app-name-locked {
    font-size: 56px;
    font-weight: 800;
    color: #1a1a2e;
    text-align: center;
    margin-bottom: 16px;
  }
  .locked-label {
    font-size: 30px;
    color: #D85A30;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 3px;
    margin-bottom: 40px;
  }
  .divider {
    width: 80px;
    height: 4px;
    background: #e0ddd6;
    border-radius: 4px;
    margin-bottom: 48px;
  }
  .unlock-instruction {
    font-size: 38px;
    color: #555;
    text-align: center;
    line-height: 1.4;
    margin-bottom: 48px;
    font-weight: 500;
  }
  .unlock-instruction strong { color: #7F77DD; font-weight: 800; }
  .subject-badge {
    background: #7F77DD;
    color: #fff;
    border-radius: 40px;
    padding: 18px 40px;
    font-size: 30px;
    font-weight: 700;
    margin-bottom: 60px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .subject-icon { font-size: 32px; }
  .xp-preview {
    background: #FFF8EC;
    border: 3px solid #EF9F27;
    border-radius: 32px;
    padding: 28px 56px;
    margin-bottom: 56px;
    display: flex;
    align-items: center;
    gap: 20px;
    box-shadow: 0 4px 20px rgba(239,159,39,0.15);
  }
  .xp-preview-icon { font-size: 48px; }
  .xp-preview-label { font-size: 30px; color: #888; font-weight: 500; }
  .xp-preview-amount { font-size: 52px; font-weight: 800; color: #EF9F27; }
  .start-btn {
    background: linear-gradient(135deg, #7F77DD, #6c65c4);
    color: #fff;
    border-radius: 44px;
    padding: 44px 0;
    width: 100%;
    font-size: 44px;
    font-weight: 800;
    text-align: center;
    letter-spacing: 0.5px;
    box-shadow: 0 12px 40px rgba(127,119,221,0.45);
    margin-bottom: 32px;
  }
  .dismiss-link {
    font-size: 26px;
    color: #aaa;
    text-align: center;
  }
  .dismiss-link u { text-decoration-style: dotted; }
</style>
</head>
<body>
<div class="phone-frame">
  <div class="caption-banner">Earn it before you open it.</div>

  <div class="status-bar">
    <span class="status-time">9:41</span>
    <span class="status-icons">▲ ◆ ▌▌ 87%</span>
  </div>

  <div class="main-content">
    <div class="app-icon-wrapper">
      <div class="app-icon-large">📸</div>
      <div class="lock-overlay">🔒</div>
    </div>

    <div class="app-name-locked">Instagram</div>
    <div class="locked-label">🚫 App is Locked</div>

    <div class="divider"></div>

    <div class="unlock-instruction">
      Answer <strong>3 questions</strong> to unlock<br>Instagram right now
    </div>

    <div class="subject-badge">
      <span class="subject-icon">📐</span>
      Math &nbsp;·&nbsp; Grade 7
    </div>

    <div class="xp-preview">
      <span class="xp-preview-icon">⚡</span>
      <div>
        <div class="xp-preview-label">You'll earn</div>
        <div class="xp-preview-amount">+30 XP</div>
      </div>
    </div>

    <div class="start-btn">🚀 &nbsp; Start Quiz</div>
    <div class="dismiss-link"><u>Remind me later</u></div>
  </div>
</div>
</body>
</html>
